<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🦁 Para Agus 🦁</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* escena inicial */
#escenaInicial {
  position: fixed;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
  z-index: 3;
}

#estadio {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform-origin: center;
  transition: transform 1.2s ease-in;
}

/* 🎥 cámara inclinada + zoom */
.zoomTilt {
  transform: scale(2.5) rotate(3deg);
  filter: blur(3px);
}

/* 📳 vibración */
.vibrate {
  animation: vibrate 0.3s linear infinite;
}

@keyframes vibrate {
  0% { transform: translate(0px, 0px) rotate(0deg); }
  25% { transform: translate(2px, -2px) rotate(1deg); }
  50% { transform: translate(-2px, 2px) rotate(-1deg); }
  75% { transform: translate(2px, 2px) rotate(1deg); }
  100% { transform: translate(0px, 0px) rotate(0deg); }
}

/* túnel */
#tunnel {
  position: fixed;
  width: 100vw;
  height: 100dvh;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, black 70%);
  opacity: 0;
  z-index: 4;
  transition: opacity 0.6s;
}

.tunnel-active {
  opacity: 1;
}

/* flash */
#flash {
  position: fixed;
  width: 100vw;
  height: 100dvh;
  background: white;
  opacity: 0;
  z-index: 5;
}

.flash {
  animation: flashAnim 0.4s;
}

@keyframes flashAnim {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* contenido final */
#contenido {
  position: fixed;
  width: 100vw;
  height: 100dvh;
  opacity: 0;
  transition: opacity 0.8s ease;
  z-index: 2;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#textoMedio {
  margin-bottom: 50px;
  font-size: 2rem;
  color: rgb(231, 40, 40);
  text-align: center;
  font-family: Arial, sans-serif;
}

#textoFinal {
  margin-bottom: 100px;
  font-size: 3rem;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

#imagenFinal {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: opacity 0.3s ease;
}

/* texto */
#overlayTexto {
  position: absolute;
  top: 400px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 4rem;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="escenaInicial">
  <img id="estadio" src="estadio_fuera.png">
  <div id="overlayTexto">👆 Tocá para entrar</div>
</div>

<div id="tunnel"></div>
<div id="flash"></div>

<div id="contenido">
  <img id="imagenFinal" src="estadio_dentro.png">
  <div id="textoMedio"></div>
  <div id="textoFinal"></div>
</div>

<audio id="audio" src="estudiantes.mp3"></audio>

<script>

  function confettiRiver() {
  const duration = 2000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 70,
      origin: { x: 0, y:0.15 },
      colors: ['#ff0000', '#ffffff']
    });

    confetti({
      particleCount: 5,
      angle: 120,
      spread: 70,
      origin: { x: 1 , y:0.2 },
      colors: ['#ff0000', '#ffffff']
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

  let paso = 0;

  document.addEventListener("click", () => {
    paso++;

    const estadio = document.getElementById("estadio");
    const escena = document.getElementById("escenaInicial");
    const tunnel = document.getElementById("tunnel");
    const contenido = document.getElementById("contenido");
    const flash = document.getElementById("flash");
    const audio = document.getElementById("audio");

    if (paso === 1) {

    // 🎬 arranca audio suave
    audio.volume = 0.2;
    audio.play().catch(() => {});

    // 🎥 cámara inclinada + zoom
    estadio.classList.add("zoomTilt");

    // 📳 vibración
    estadio.classList.add("vibrate");

    // 🔊 subir volumen progresivo
    let vol = 0.2;
    const subirVolumen = setInterval(() => {
      if (vol < 1) {
        vol += 0.1;
        audio.volume = vol;
      } else {
        clearInterval(subirVolumen);
      }
    }, 150);

    // 🌑 túnel aparece
    setTimeout(() => {
      tunnel.classList.add("tunnel-active");
    }, 600);

    // 💡 flash + salida
    setTimeout(() => {
      flash.classList.add("flash");
      estadio.classList.remove("vibrate");

      escena.style.display = "none";
      contenido.style.opacity = 1;
    }, 1300);
    confettiRiver();
    document.getElementById("textoMedio").innerHTML = `
        <h2>Toca al narigón para recibir tu regalo</h2>
        <h2>(Cualquiera de los 2 😂)</h2>
    `;
  }
  

    else if (paso === 2) {
      const img = document.getElementById("imagenFinal");

img.style.opacity = 0;

setTimeout(() => {
  img.src = "regalo.jpeg";
  img.style.opacity = 1;
}, 200);
    document.getElementById("imagenFinal").src = "regalo.jpeg";
    document.getElementById("textoMedio").innerHTML = ``;
    document.getElementById("textoFinal").innerHTML = `
    <h2>Esperemos que alcance para el carbon!</h2>
    <p>Andy, Pili, Anita, Mary, Tata y Mamama</p>
    `;

  confetti({
    particleCount: 180,
    spread: 100,
    colors: ['#ff0000', '#ffffff']
  });
    }
  });
</script>

</body>
</html>
