<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Pili 💜</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1f1f1f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    .pantalla {
      cursor: pointer;
    }

    .titulo {
      font-size: 2rem;
      letter-spacing: 3px;
      animation: fadeIn 2s ease;
    }

    .sub {
      opacity: 0.7;
      margin-top: 10px;
    }

    #contenido {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1.5s ease;
    }

    img {
      max-width: 90%;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: zoomIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes zoomIn {
      from {transform: scale(0.8);}
      to {transform: scale(1);}
    }
  </style>
</head>

<body onclick="iniciar()">

  <!-- Pantalla inicial -->
  <div class="pantalla" id="inicio">
    <div class="titulo">
      THE ONE WHERE <br>
      <b>PILI TURNS OLDER</b>
    </div>
    <div class="sub">(tocá la pantalla 👆)</div>
  </div>

  <!-- Contenido -->
  <div id="contenido">
    <h2>🎉 ¡Feliz cumple Pili! 🎉</h2>
    <img src="image.jpg" alt="Familia">
  </div>

  <!-- Audio -->
  <audio id="audio" src="friends.mp3"></audio>

  <script>
    function iniciar() {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("contenido").style.display = "flex";

      // 🎊 Confetti
      confetti({
        particleCount: 180,
        spread: 100,
        origin: { y: 0.6 }
      });

      // 🎵 Audio
      const audio = document.getElementById("audio");
      audio.play().catch(() => {});
    }
  </script>

</body>
</html>
