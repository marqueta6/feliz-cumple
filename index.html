<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Pili 💜</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1f1f1f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    text-align: center;
    padding: 20px;
  }

  .pantalla {
    cursor: pointer;
    width: 100%;
  }

  .titulo {
    font-size: 2.2rem;
    line-height: 1.3;
    font-weight: bold;
  }

  .titulo b {
    font-size: 2.6rem;
    display: block;
    margin-top: 10px;
  }

  .sub {
    margin-top: 25px;
    font-size: 1.2rem;
    opacity: 0.8;
    animation: pulse 1.5s infinite;
  }

  #contenido {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  img {
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    margin-top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  h2 {
    font-size: 1.8rem;
  }

  p {
    font-size: 1.2rem;
  }

  /* Animación de “tocá” */
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
  }

  /* 📱 Ajustes extra para celulares chicos */
  @media (max-width: 400px) {
    .titulo {
      font-size: 1.8rem;
    }

    .titulo b {
      font-size: 2.2rem;
    }

    .sub {
      font-size: 1rem;
    }
  }
</style>
</head>

<body onclick="iniciar()">

  <!-- Pantalla inicial -->
  <div class="pantalla" id="inicio">
    <div class="titulo">
      THE ONE WHERE <br>
      <b>PILI TURNS 47</b>
    </div>
    <div class="sub">(tocá la pantalla 👆)</div>
  </div>

  <!-- Contenido -->
  <div id="contenido">
    <h2>🎉 ¡Feliz cumple Pili! 🎉</h2>
    <img src="image.jpg" alt="Familia">
  </div>

  <!-- Audio -->
  <audio id="audio" src="friends.mp3"></audio>

<script>
  let paso = 0;

  function iniciar() {
    paso++;

    // PASO 1 → mostrar foto familiar
    if (paso === 1) {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("contenido").style.display = "flex";

      document.getElementById("imagen").src = "imagen.jpg";

      confetti({
        particleCount: 180,
        spread: 100,
        origin: { y: 0.6 }
      });

      const audio = document.getElementById("audio");
      audio.play().catch(() => {});
    }

    // PASO 2 → mostrar regalo 💸
    else if (paso === 2) {
      document.getElementById("imagen").src = "regalo.jpg";

      confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 }
      });
    }

    // PASO 3 → mensaje final
    else if (paso === 3) {
      document.getElementById("contenido").innerHTML = `
        <h2>💜 Disfrutá tu regalo Pili 💜</h2>
        <p>Porque te lo merecés TODO 😄</p>
        <p>Con amor,<br>Andy, Agus, Anita, Mary, Tata y Mamama</p>
      `;

      confetti({
        particleCount: 200,
        spread: 120
      });
    }
  }
</script>

</body>
</html>
